<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>teletty</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://telegram.org 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:;">
  <link rel="stylesheet" href="/vendor/xterm.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
    body { background: #1a1b26; color: #c0caf5; display: flex; flex-direction: column; }
    .tab-bar { display: flex; height: 36px; background: #16161e; border-bottom: 1px solid #292e42; overflow-x: auto; flex-shrink: 0; }
    .tab { display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: #565f89; cursor: pointer; white-space: nowrap; border-right: 1px solid #292e42; user-select: none; }
    .tab.active { color: #c0caf5; background: #1a1b26; }
    .tab .close { margin-left: 8px; font-size: 11px; opacity: 0.5; }
    .tab .close:hover { opacity: 1; color: #f7768e; }
    .tab-add { padding: 0 14px; color: #565f89; cursor: pointer; display: flex; align-items: center; font-size: 16px; }
    .tab-add:hover { color: #7aa2f7; }
    .terminal-container { flex: 1; position: relative; overflow: hidden; }
    .terminal-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
    .terminal-wrapper.active { display: block; }
    .smart-buttons { display: none; flex-wrap: wrap; gap: 6px; padding: 8px 10px; background: #16161e; border-top: 1px solid #292e42; flex-shrink: 0; }
    .smart-buttons.visible { display: flex; }
    .smart-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #3b4261; background: #1a1b26; color: #c0caf5; font-size: 14px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .smart-btn:active { background: #7aa2f7; color: #1a1b26; }
    .smart-btn.danger { border-color: #f7768e; color: #f7768e; }
    .control-bar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 10px; background: #16161e; border-top: 1px solid #292e42; flex-shrink: 0; align-items: center; }
    .ctrl-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #3b4261; background: #1a1b26; color: #7aa2f7; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .ctrl-btn:active { background: #292e42; }
    .ctrl-btn.voice { color: #bb9af7; }
    .ctrl-btn.voice.recording { color: #f7768e; animation: pulse 1s infinite; }
    .ctrl-btn.auto-approve { color: #565f89; margin-left: auto; }
    .ctrl-btn.auto-approve.active { color: #f7768e; border-color: #f7768e; background: #2d1520; }
    .ctrl-btn.auto-approve.confirming { color: #e0af68; border-color: #e0af68; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-bar { display: flex; align-items: center; padding: 4px 10px; height: 24px; background: #16161e; border-top: 1px solid #292e42; font-size: 11px; color: #565f89; flex-shrink: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: #9ece6a; }
    .status-dot.disconnected { background: #f7768e; }
    .auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1b26; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 12px; }
    .auth-overlay.hidden { display: none; }
    .auth-spinner { width: 32px; height: 32px; border: 3px solid #292e42; border-top-color: #7aa2f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-error { color: #f7768e; font-size: 14px; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-spinner"></div>
    <div style="color: #565f89; font-size: 13px;">Connecting...</div>
  </div>
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="main">main <span class="close" data-close="main">&times;</span></div>
    <div class="tab-add" id="addTab">+</div>
  </div>
  <div class="terminal-container" id="terminalContainer">
    <div class="terminal-wrapper active" id="term-main"></div>
  </div>
  <div class="smart-buttons" id="smartButtons"></div>
  <div class="control-bar">
    <button class="ctrl-btn" id="btnUp">&#9650;</button>
    <button class="ctrl-btn" id="btnDown">&#9660;</button>
    <button class="ctrl-btn" id="btnTab">Tab</button>
    <button class="ctrl-btn" id="btnEsc">Esc</button>
    <button class="ctrl-btn" id="btnCtrlC">Ctrl+C</button>
    <button class="ctrl-btn voice" id="btnVoice">&#127908;</button>
    <button class="ctrl-btn auto-approve" id="btnAutoApprove">&#9889; Auto</button>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
  <script src="/vendor/xterm.min.js"></script>
  <script src="/vendor/xterm-addon-fit.min.js"></script>
  <script src="/vendor/xterm-addon-webgl.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
