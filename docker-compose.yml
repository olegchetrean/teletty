services:
  teletty:
    build: .
    container_name: teletty
    restart: unless-stopped
    ports:
      - "127.0.0.1:7681:7681"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    # Opt in to audit logging by setting AUDIT_LOG_DIR=/var/log/teletty in .env
    # and uncommenting the volume below.
    # volumes:
    #   - terminal-logs:/var/log/teletty

# volumes:
#   terminal-logs:
