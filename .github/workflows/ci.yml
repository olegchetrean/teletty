name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm ci
      - run: npm test
      - run: node bin/teletty.js --version
      - run: node bin/teletty.js --help

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      # `npm audit` exits non-zero on any finding; we accept moderate-and-below
      # so a single transitive moderate doesn't block PRs, but fail on high+.
      - run: npm audit --audit-level=high
